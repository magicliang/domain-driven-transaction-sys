apiVersion: apps/v1
kind: Deployment
metadata:
  name: ddts-app
  namespace: ddts-prod
  labels:
    app: ddts-app
    environment: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ddts-app
  template:
    metadata:
      labels:
        app: ddts-app
        environment: prod
    spec:
      initContainers:
        - name: wait-for-mariadb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for MariaDB to be ready..."
              until nc -z mariadb-svc 3306; do
                echo "MariaDB is not ready yet, retrying in 2s..."
                sleep 2
              done
              echo "MariaDB is ready!"
      containers:
        - name: ddts-app
          image: domain-driven-transaction-sys:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8502
              name: http
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          resources:
            requests:
              memory: "1536Mi"
              cpu: "1000m"
            limits:
              memory: "3Gi"
              cpu: "2000m"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8502
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8502
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8502
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 3
